# syntax: Render Blueprint — https://render.com/docs/blueprint-spec
# Backend container for Swing Analyzer. Render reads this file when the repo
# is connected as a Blueprint; pushes to the default branch auto-deploy.
services:
  - type: web
    name: swing-analyzer-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Set this to the deployed Vercel frontend URL after the first deploy.
      - key: ALLOWED_ORIGINS
        sync: false
      # Run the lite MediaPipe pose model on the free tier to stay within the
      # analysis budget; local/CI default to 1 (accurate).
      - key: POSE_MODEL_COMPLEXITY
        value: "0"
      # Trim free-tier analysis to fit the 60s budget: ~0.3s/frame on 0.1 vCPU
      # means 75 sampled frames is about 22s before model init/decode overhead.
      - key: POSE_TARGET_FPS
        value: "15"
      - key: POSE_MAX_FRAMES
        value: "75"
